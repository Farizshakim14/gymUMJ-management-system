<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoring Slot Latihan</title>

<link rel="icon" type="image/png" href="images/logo-umj.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body onload="cekWadek()">

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="d-flex">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
<h3>Wadek 2</h3>

<a href="wadek2.html">Dashboard</a>
<a href="monitoringuser.html">Monitoring Users</a>
<a href="monitoringbooking.html">Monitoring Booking</a>
<a href="monitoringabsensi.html">Monitoring Absensi</a>
<a href="monitoringslotlatihan.html" class="active">Monitoring Slot</a>
<a href="#" onclick="logout()">Logout</a>
</aside>

<!-- CONTENT -->
<main class="content flex-grow-1">
<div class="page-container">

<div class="page-header">
<div class="left d-flex align-items-center gap-2">

<button class="menu-btn d-md-none" onclick="toggleSidebar()">
<span></span>
<span></span>
<span></span>
</button>

<h2 class="mb-0">Monitoring Slot Latihan</h2>
</div>
</div>

<!-- TABLE -->
<div class="table-wrapper">
<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Jam</th>
<th>Kapasitas</th>
<th>Sisa Slot</th>
</tr>
</thead>

<tbody id="slotTable"></tbody>

</table>
</div>

</div>
</main>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<script>

// 🔒 CEK WADEK
function cekWadek(){
auth.onAuthStateChanged(user=>{
if(!user) window.location="index.html"
else{
db.ref("users/"+user.uid).once("value",snap=>{
let d=snap.val()
if(!d || d.role!=="wadek2"){
alert("Akses ditolak!")
window.location="index.html"
}
})
}
})
}

// 🔥 LOGOUT
function logout(){
auth.signOut().then(()=>window.location="index.html")
}

// 🔥 SIDEBAR
function toggleSidebar(){
sidebar.classList.toggle("show")
overlay.classList.toggle("show")
}

// 🔥 LOAD SLOT
db.ref("slots").on("value", snap=>{

let html=""

snap.forEach(s=>{

let d = s.val()

let kapasitas = d.kapasitas ?? 0
let sisa = d.remaining ?? kapasitas

html += `
<tr>
<td data-label="Tanggal">${d.date || "-"}</td>
<td data-label="Jam">${d.time || "-"}</td>
<td data-label="Kapasitas">${kapasitas}</td>
<td data-label="Sisa Slot">${sisa}</td>
</tr>
`

})

slotTable.innerHTML = html || `
<tr>
<td colspan="4" style="text-align:center">
Belum ada slot latihan
</td>
</tr>
`

})

</script>

</body>
</html>
