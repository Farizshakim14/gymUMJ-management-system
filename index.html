<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

  <!-- ✅ WAJIB: BIAR RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login Admin Gym</title>

  <link rel="icon" type="image/png" href="images/logo-umj.png">
  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <!-- CSS utama -->
  <link rel="stylesheet" href="style.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body class="login-page">

<!-- ================= LOGIN WRAPPER ================= -->
<div class="login-wrapper">

  <div class="login-box">

    <!-- Header -->
    <div class="login-header">
      <h2>Admin Gym</h2>
      <p>Silakan login untuk melanjutkan</p>
    </div>

    <!-- Input Email -->
    <input 
      id="email" 
      class="form-control login-input" 
      placeholder="Masukkan Email"
    >

    <!-- Input Password -->
    <input 
      id="password" 
      type="password" 
      class="form-control login-input" 
      placeholder="Masukkan Password"
    >

    <!-- Button Login -->
    <button 
      class="btn login-btn w-100" 
      onclick="login()"
    >
      Login
    </button>

    <!-- Message -->
    <p id="msg" class="login-msg"></p>

  </div>

</div>

<!-- ================= FIREBASE ================= -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>
function login(){

  let email = document.getElementById("email").value;
  let pass  = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass)
  .then((userCredential)=>{

      let uid = userCredential.user.uid;

      console.log("UID:", uid);

      firebase.database().ref("users/" + uid).once("value")
      .then((snapshot)=>{

          if(!snapshot.exists()){

              let roleBaru = "admin";

              if(email === "wadek2@gmail.com"){
                  roleBaru = "wadek2";
              }

              return firebase.database().ref("users/" + uid).set({
                  role: roleBaru
              });
          }

      })
      .then(()=>{

          return firebase.database().ref("users/" + uid).once("value");

      })
      .then((snapshot)=>{

          let data = snapshot.val();

          if(data.role === "admin"){
              window.location = "dashboard.html";
          }
          else if(data.role === "wadek2"){
              window.location = "wadek2.html";
          }
          else{
              document.getElementById("msg").innerText="Role tidak dikenali";
          }

      });

  })
  .catch(err=>{
      console.log("ERROR:", err.code);

      let pesan = "";

      if(err.code === "auth/user-not-found"){
          pesan = "Email tidak terdaftar";
      }
      else if(err.code === "auth/wrong-password"){
          pesan = "Password salah";
      }
      else if(err.code === "auth/invalid-email"){
          pesan = "Format email tidak valid";
      }
      else if(err.code === "auth/invalid-credential"){
          pesan = "Email atau password salah";
      }
      else{
          pesan = "Login gagal, coba lagi";
      }

      document.getElementById("msg").innerText = pesan;
  });
}
</script>

</body>
</html>
