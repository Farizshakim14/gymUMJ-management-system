<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoring Users - Wadek 2</title>

<link rel="icon" type="image/png" href="images/logo-umj.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body onload="cekWadek()">

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <h3>Wadek 2</h3>

    <a href="wadek2.html">Dashboard</a>
    <a href="monitoringuser.html" class="active">Monitoring Users</a>
    <a href="monitoringbooking.html">Monitoring Booking</a>
    <a href="monitoringabsensi.html">Monitoring Absensi</a>
    <a href="monitoringslotlatihan.html">Monitoring Slot</a>
    <a href="#" onclick="logout()">Logout</a>
  </aside>

  <!-- CONTENT -->
  <main class="content">

    <div class="page-container">

      <div class="page-header">
        <div class="left">
          <button class="menu-btn d-md-none" onclick="toggleSidebar()">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <h2>Monitoring Users</h2>
        </div>
      </div>

      <!-- TABLE -->
      <div class="table-wrapper">

        <table>

          <thead>
            <tr>
              <th>Nama</th>
              <th>Email</th>
              <th>NIM</th>
              <th>Berat</th>
              <th>Tinggi</th>
              <th>Usia</th>
              <th>Tujuan</th>
            </tr>
          </thead>

          <tbody id="userTable">
            <tr>
              <td colspan="7" style="text-align:center;">Loading...</td>
            </tr>
          </tbody>

        </table>

      </div>

    </div>
  </main>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<script>

// 🔒 CEK WADEK
function cekWadek(){
  auth.onAuthStateChanged(u=>{
    if(!u){
      window.location="index.html";
    }else{
      db.ref("users/" + u.uid).once("value", snap=>{
        let data = snap.val();
        if(!data || data.role !== "wadek2"){
          alert("Akses ditolak!");
          window.location="index.html";
        }
      });
    }
  });
}

// 🔥 SIDEBAR
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("show");
  document.getElementById("overlay").classList.toggle("show");
}

// 🔥 LOGOUT
function logout(){
  auth.signOut().then(()=> window.location="index.html");
}

// 🔥 LOAD DATA USER
db.ref("users").on("value", snapshot=>{
  let data = snapshot.val();
  let html = "";

  if(!data){
    html = `<tr><td colspan="7" style="text-align:center;">Tidak ada data</td></tr>`;
  }else{

    Object.keys(data).forEach(uid=>{

      let u = data[uid];

      // ❗ skip admin & wadek
      if(u.role === "admin" || u.role === "wadek2") return;

      // 🔥 HITUNG USIA DARI TANGGAL LAHIR
      let usia = "-";
      if(u.tanggal_lahir){
        let t = new Date();
        let l = new Date(u.tanggal_lahir);
        usia = t.getFullYear() - l.getFullYear();
      }

      html += `
      <tr>
        <td data-label="Nama">${u.nama || "-"}</td>
        <td data-label="Email">${u.email || "-"}</td>
        <td data-label="NIM">${u.nim || "-"}</td>
        <td data-label="Berat">${u.bb || "-"}</td>
        <td data-label="Tinggi">${u.tb || "-"}</td>
        <td data-label="Usia">${usia}</td>
        <td data-label="Tujuan">${u.tujuan || "-"}</td>
      </tr>
      `;
    });

  }

  document.getElementById("userTable").innerHTML = html;
});

</script>

</body>
</html>
