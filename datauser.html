<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Users</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body onload="cekAdmin()">

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="d-flex">

<aside class="sidebar" id="sidebar">
<h3>Admin Gym</h3>
<a href="dashboard.html">Dashboard</a>
<a href="datauser.html" class="active">Users</a>
<a href="databooking.html">Booking</a>
<a href="dataabsensi.html">Absensi</a>
<a href="slotlatihan.html">Slot Latihan</a>
<a href="#" onclick="logout()">Logout</a>
</aside>

<main class="content flex-grow-1">
<div class="page-container">

<div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
<div class="left d-flex align-items-center gap-2">
<button class="menu-btn d-md-none" onclick="toggleSidebar()">
<i class="bi bi-list"></i>
</button>
<h2 class="mb-0">Data Users</h2>
</div>

<button onclick="openAdd()" class="btn btn-primary">
+ Tambah User
</button>
</div>

<div class="table-wrapper mt-3">

<div class="table-responsive">

<table class="table table-dark table-hover align-middle">

<thead>
<tr>
<th>Nama</th>
<th>Email</th>
<th>NIM</th>
<th>Berat</th>
<th>Tinggi</th>
<th>Usia</th>
<th>Tujuan</th>
<th style="width:160px">Aksi</th>
</tr>
</thead>

<tbody id="userTable"></tbody>

</table>

</div>
</div>

</div>
</main>
</div>


<!-- ================= MODAL TAMBAH / EDIT USER ================= -->
<div id="userModal" class="modalBox">
<div class="modalContent">

<h3 id="modalTitle" class="mb-3">Tambah User</h3>

<input id="namaForm" placeholder="Nama" class="slot-input">
<input id="emailForm" placeholder="Email" class="slot-input">

<!-- PASSWORD BARU -->
<input id="passwordForm" type="password" placeholder="Password" class="slot-input">

<input id="nimForm" placeholder="NIM" class="slot-input">
<input id="bbForm" placeholder="Berat Badan (kg)" class="slot-input">
<input id="tbForm" placeholder="Tinggi Badan (cm)" class="slot-input">
<input id="lahirForm" type="date" class="slot-input">
<input id="tujuanForm" placeholder="Tujuan" class="slot-input">

<button onclick="saveUser()" class="btn btn-primary w-100">SIMPAN</button>
<button onclick="closeModal()" class="btn btn-danger w-100 mt-2">BATAL</button>

</div>
</div>


<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>

<script src="firebase.js"></script>

<script>

function toggleSidebar(){
sidebar.classList.toggle("show");
overlay.classList.toggle("show");
}

function cekAdmin(){
auth.onAuthStateChanged(u=>{
if(!u) window.location="index.html";
});
}


db.ref("users").on("value", snap=>{

let html="";

if(!snap.exists()){
userTable.innerHTML=`
<tr>
<td colspan="8" style="text-align:center">
Belum ada data user
</td>
</tr>`;
return;
}

snap.forEach(u=>{

let d=u.val();

let usia="-";
if(d.tanggal_lahir){
let t=new Date();
let l=new Date(d.tanggal_lahir);
usia=t.getFullYear()-l.getFullYear();
}

html+=`
<tr>

<td data-label="Nama">${d.nama||"-"}</td>
<td data-label="Email">${d.email||"-"}</td>
<td data-label="NIM">${d.nim||"-"}</td>
<td data-label="Berat">${d.bb||"-"}</td>
<td data-label="Tinggi">${d.tb||"-"}</td>
<td data-label="Usia">${usia}</td>
<td data-label="Tujuan">${d.tujuan||"-"}</td>

<td data-label="Aksi">

<button class="btn btn-warning btn-sm mb-1"
onclick="openEdit('${u.key}',${JSON.stringify(d).replace(/"/g,'&quot;')})">
Edit
</button>

<button class="btn btn-danger btn-sm"
onclick="hapus('${u.key}')">
Hapus
</button>

</td>

</tr>`;
});

userTable.innerHTML=html;

});


function hapus(id){
if(confirm("Yakin hapus user ini?")){
db.ref("users/"+id).remove();
}
}


let editID=null;


function openAdd(){

editID=null;

modalTitle.innerText="Tambah User";

namaForm.value="";
emailForm.value="";
passwordForm.value="";
nimForm.value="";
bbForm.value="";
tbForm.value="";
lahirForm.value="";
tujuanForm.value="";

userModal.style.display="flex";

}


function openEdit(id,d){

editID=id;

modalTitle.innerText="Edit User";

namaForm.value=d.nama||"";
emailForm.value=d.email||"";

passwordForm.value=""; // tidak ubah password

nimForm.value=d.nim||"";
bbForm.value=d.bb||"";
tbForm.value=d.tb||"";
lahirForm.value=d.tanggal_lahir||"";
tujuanForm.value=d.tujuan||"";

userModal.style.display="flex";

}



function closeModal(){
userModal.style.display="none";
}


function saveUser(){

let data={

nama:namaForm.value,
email:emailForm.value,
nim:nimForm.value,
bb:bbForm.value,
tb:tbForm.value,
tanggal_lahir:lahirForm.value,
tujuan:tujuanForm.value

};

let password=passwordForm.value;

if(!data.nama || !data.email){
alert("Nama & Email wajib!");
return;
}


if(editID){

db.ref("users/"+editID).update(data);

}else{

if(!password){
alert("Password wajib diisi!");
return;
}

auth.createUserWithEmailAndPassword(data.email,password)

.then(res=>{

let uid=res.user.uid;

db.ref("users/"+uid).set(data);

})

.catch(err=>{

alert(err.message);

});

}

closeModal();

}


function logout(){
auth.signOut().then(()=>window.location="index.html");
}

</script>

</body>
</html>
