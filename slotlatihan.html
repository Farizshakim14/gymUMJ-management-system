<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

  <!-- RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Slot Latihan</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    .overlay { pointer-events: none; }
    .overlay.show { pointer-events: auto; }
  </style>
</head>

<body onload="cekAdmin()">

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="d-flex">

  <aside class="sidebar" id="sidebar">
    <h3>Admin Gym</h3>
    <a href="dashboard.html">Dashboard</a>
    <a href="datauser.html">Users</a>
    <a href="databooking.html">Booking</a>
    <a href="dataabsensi.html">Absensi</a>
    <a href="slotlatihan.html" class="active">Slot Latihan</a>
    <a href="#" onclick="logout()">Logout</a>
  </aside>

  <main class="content flex-grow-1">
    <div class="page-container">

      <div class="page-header">
        <div class="left">
          <button class="menu-btn d-md-none" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
          </button>
          <h2 class="mb-0">Slot Latihan</h2>
        </div>

        <button onclick="openAdd()" class="btn btn-primary">
          + Tambah Slot
        </button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Waktu</th>
              <th>Status</th>
              <th>Sisa Kapasitas</th>
              <th style="width:160px">Aksi</th>
            </tr>
          </thead>
          <tbody id="slotTable"></tbody>
        </table>
      </div>

    </div>
  </main>
</div>

<!-- MODAL -->
<div id="slotModal" class="modalBox">
  <div class="modalContent">
    <h3 class="mb-3">Tambah Slot</h3>

    <input id="tanggalForm" type="date" class="slot-input">

    <select id="waktuForm" class="slot-input">
      <option value="">-- Pilih Sesi --</option>
      <option value="08:00-10:00">08:00-10:00</option>
      <option value="10:00-12:00">10:00-12:00</option>
      <option value="13:00-15:00">13:00-15:00</option>
    </select>

    <input id="kapasitasForm" type="number" class="slot-input" placeholder="Kapasitas">

    <button onclick="saveSlot()" class="btn btn-primary w-100">SIMPAN</button>
    <button onclick="closeModal()" class="btn btn-danger w-100 mt-2">BATAL</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<script>
function toggleSidebar(){
  sidebar.classList.toggle("show");
  overlay.classList.toggle("show");
}

function cekAdmin(){
  auth.onAuthStateChanged(u=>{
    if(!u) location="index.html";
  });
}

function logout(){
  auth.signOut().then(()=>location="index.html");
}

function openAdd(){ slotModal.style.display="flex"; }
function closeModal(){ slotModal.style.display="none"; }

/* ===== NORMALIZE SESI ===== */
function normalize(text){
  return text
    .replace(/\s/g, "")
    .replace(".", ":")
    .replace("–", "-")
    .replace("—", "-")
    .trim();
}

/* ===== SIMPAN SLOT ===== */
function saveSlot(){
  const date = tanggalForm.value;
  const time = normalize(waktuForm.value);
  const kapasitas = parseInt(kapasitasForm.value);

  if(!date || !time || !kapasitas){
    alert("Lengkapi data!");
    return;
  }

  db.ref("slots")
    .orderByChild("date")
    .equalTo(date)
    .once("value", snap=>{
      let ada = false;
      snap.forEach(s=>{
        if(s.val().time === time) ada = true;
      });

      if(ada){
        alert("Slot sudah ada!");
        return;
      }

      db.ref("slots").push({
        date,
        time,
        kapasitas,
        remaining: kapasitas,
        status: "Aktif"
      });

      closeModal();
    });
}

function deleteSlot(id){
  if(confirm("Hapus slot ini?")){
    db.ref("slots/"+id).remove();
  }
}

/* ===== LOAD SLOT ===== */
db.ref("slots").on("value", snap=>{
  let html = "";
  const today = new Date().toISOString().split("T")[0];

  snap.forEach(s=>{
    const slot = s.val();
    const remaining = slot.remaining ?? slot.kapasitas;
    const status =
      slot.date < today || remaining === 0 ? "Ditutup" : "Aktif";

    html += `
      <tr>
        <td data-label="Tanggal">${slot.date}</td>
        <td data-label="Waktu">${slot.time}</td>
        <td data-label="Status">
          <span class="badge ${status==="Aktif"?"bg-success":"bg-danger"}">
            ${status}
          </span>
        </td>
        <td data-label="Sisa Kapasitas">${remaining}/${slot.kapasitas}</td>
        <td data-label="Aksi">
          <button class="btn btn-danger btn-sm"
            onclick="deleteSlot('${s.key}')">
            Hapus
          </button>
        </td>
      </tr>
    `;
  });

  slotTable.innerHTML = html || `
    <tr><td colspan="5" style="text-align:center">
      Belum ada slot
    </td></tr>
  `;
});
</script>

</body>
</html>
