<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

  <!-- AGAR RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Data Booking</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body onload="cekAdmin()">

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="d-flex">

  <aside class="sidebar" id="sidebar">
    <h3>Admin Gym</h3>
    <a href="dashboard.html">Dashboard</a>
    <a href="datauser.html">Users</a>
    <a href="databooking.html" class="active">Booking</a>
    <a href="dataabsensi.html">Absensi</a>
    <a href="slotlatihan.html">Slot Latihan</a>
    <a href="#" onclick="logout()">Logout</a>
  </aside>

  <main class="content flex-grow-1">
    <div class="page-container">

      <div class="page-header">
        <div class="left">
          <button class="menu-btn d-md-none" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
          </button>
          <h2 class="mb-0">Data Booking</h2>
        </div>

        <button onclick="openAdd()" class="btn btn-primary">
          + Tambah Booking
        </button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Tanggal</th>
              <th>Sesi</th>
              <th style="width:140px">Aksi</th>
            </tr>
          </thead>
          <tbody id="bookingTable"></tbody>
        </table>
      </div>

    </div>
  </main>
</div>

<div id="bookingModal" class="modalBox">
  <div class="modalContent">
    <h3 class="mb-3">Tambah Booking</h3>

    <label>User</label>
    <select id="userSelect" class="slot-input"></select>

    <label>Tanggal</label>
    <input id="tanggalForm" type="date" class="slot-input">

    <label>Sesi</label>
    <select id="sessionForm" class="slot-input">
      <option value="">-- Pilih Sesi --</option>
    </select>

    <button onclick="saveBooking()" class="btn btn-primary w-100">SIMPAN</button>
    <button onclick="closeModal()" class="btn btn-danger w-100 mt-2">BATAL</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<script>

function toggleSidebar(){
  sidebar.classList.toggle("show");
  overlay.classList.toggle("show");
}

function cekAdmin(){
  auth.onAuthStateChanged(u=>{
    if(!u) location="index.html";
  });
}

function logout(){
  auth.signOut().then(()=>location="index.html");
}

/* NORMALIZE JAM */
function normalize(text){
  return text
    .replace(/[^\d:-]/g,"")
    .replace(".",":")
    .replace(/\s/g,"")
    .trim();
}

let users = {};
let slotsByDate = {};

/* LOAD USERS */
db.ref("users").on("value", snap=>{
  let opt="";
  users={};

  snap.forEach(u=>{
    users[u.key] = u.val().nama || "-";
    opt += `<option value="${u.key}">${users[u.key]}</option>`;
  });

  userSelect.innerHTML = opt;
});

/* LOAD SLOT */
db.ref("slots").on("value", snap=>{
  slotsByDate = {};

  snap.forEach(sl=>{
    const d = sl.val();
    const remaining = d.remaining ?? d.kapasitas ?? 0;

    if(remaining <= 0) return;

    if(!slotsByDate[d.date]){
      slotsByDate[d.date] = [];
    }

    if(!slotsByDate[d.date].includes(d.time)){
      slotsByDate[d.date].push(d.time);
    }
  });
});

tanggalForm.addEventListener("change", ()=>{
  const tgl = tanggalForm.value;

  sessionForm.innerHTML = `<option value="">-- Pilih Sesi --</option>`;

  if(!slotsByDate[tgl]) return;

  slotsByDate[tgl].forEach((w,i)=>{
    sessionForm.innerHTML += `
      <option value="Sesi ${i+1} (${w})">
        Sesi ${i+1} (${w})
      </option>
    `;
  });
});

/* LOAD BOOKING */
db.ref("bookings").on("value", snap=>{

  let html="";

  snap.forEach(uid=>{
    uid.forEach(b=>{
      const d=b.val();

      html+=`
        <tr>
          <td data-label="User">${d.user_name||"-"}</td>
          <td data-label="Tanggal">${d.gym_date||"-"}</td>
          <td data-label="Sesi">${d.sesi||"-"}</td>
          <td data-label="Aksi">
            <button class="btn btn-danger btn-sm"
              onclick="hapusBooking('${uid.key}','${b.key}')">
              Hapus
            </button>
          </td>
        </tr>`;
    });
  });

  bookingTable.innerHTML = html || `
    <tr>
      <td colspan="4" style="text-align:center">
        Belum ada booking
      </td>
    </tr>`;
});

/* HAPUS BOOKING + BALIKIN SLOT */
function hapusBooking(uid,id){

  if(!confirm("Hapus booking ini?")) return;

  const ref = db.ref("bookings/"+uid+"/"+id);

  ref.once("value", snap=>{

    const data = snap.val();

    if(!data){
      ref.remove();
      return;
    }

    const tanggal = data.gym_date;
    const sesi = data.sesi;

    const jam = normalize(sesi.match(/\((.*?)\)/)[1]);

    db.ref("slots")
      .orderByChild("date")
      .equalTo(tanggal)
      .once("value", slotSnap=>{

        slotSnap.forEach(s=>{

          if(normalize(s.val().time) === jam){

            s.ref.transaction(d=>{

              if(!d) return;

              const rem = d.remaining ?? d.kapasitas ?? 0;

              d.remaining = rem + 1;

              return d;

            });

          }

        });

        ref.remove();

      });

  });

}

function openAdd(){
  bookingModal.style.display="flex";
}

function closeModal(){
  bookingModal.style.display="none";
}

/* SIMPAN BOOKING */
function saveBooking(){

  const uid = userSelect.value;
  const nama = users[uid];
  const tanggal = tanggalForm.value;
  const sesi = sessionForm.value;

  if(!uid || !tanggal || !sesi){
    alert("Lengkapi data!");
    return;
  }

  const jam = normalize(sesi.match(/\((.*?)\)/)[1]);

  db.ref("slots")
    .orderByChild("date")
    .equalTo(tanggal)
    .once("value", snap=>{

      let target=null;

      snap.forEach(s=>{

        if(
          normalize(s.val().time) === jam &&
          (s.val().remaining ?? s.val().kapasitas) > 0
        ){
          target = s.ref;
        }

      });

      if(!target){
        alert("Slot penuh / tidak tersedia");
        return;
      }

      target.transaction(data=>{

        if(!data) return;

        const rem = data.remaining ?? data.kapasitas ?? 0;

        if(rem <= 0) return;

        data.remaining = rem - 1;

        return data;

      });

      const id = db.ref("bookings/"+uid).push().key;

      db.ref("bookings/"+uid+"/"+id).set({

        user_id: uid,
        user_name: nama,
        gym_date: tanggal,
        sesi: sesi,
        created_at: new Date().toISOString()

      });

      closeModal();

    });

}

</script>

</body>
</html>
