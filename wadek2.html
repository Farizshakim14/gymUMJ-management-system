<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

  <!-- WAJIB BIAR RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard Wadek 2</title>
  
<link rel="icon" type="image/png" href="images/logo-umj.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body onload="cekWadek()">

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <h3>Wadek 2</h3>

    <a href="wadek2.html" class="active">Dashboard</a>
    <a href="monitoringuser.html">Monitoring Users</a>
    <a href="monitoringbooking.html">Monitoring Booking</a>
    <a href="monitoringabsensi.html">Monitoring Absensi</a>
    <a href="monitoringslotlatihan.html">Monitoring Slot</a>
    <a href="#" onclick="logout()">Logout</a>
  </aside>

  <!-- CONTENT -->
  <main class="content">

    <div class="page-container">

      <div class="page-header">
        <div class="left">
          <button class="menu-btn d-md-none" onclick="toggleSidebar()">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <h2>Dashboard Wadek 2</h2>
        </div>
      </div>

      <!-- CARD -->
      <div class="row g-3">

        <div class="col-12 col-md-4">
          <div class="card text-white bg-primary shadow dashboard-card">
            <div class="card-body text-center">
              <h4 id="userCount">0</h4>
              <p>Total Users</p>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-4">
          <div class="card text-white bg-success shadow dashboard-card">
            <div class="card-body text-center">
              <h4 id="bookingCount">0</h4>
              <p>Total Booking</p>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-4">
          <div class="card text-white bg-warning shadow dashboard-card">
            <div class="card-body text-center">
              <h4 id="absenCount">0</h4>
              <p>Total Absensi</p>
            </div>
          </div>
        </div>

      </div>

    </div>
  </main>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<script>

// 🔒 CEK LOGIN WADEK
function cekWadek(){
  auth.onAuthStateChanged(u=>{
    if(!u){
      window.location="index.html";
    }else{
      db.ref("users/" + u.uid).once("value", snap=>{
        let data = snap.val();
        if(!data || data.role !== "wadek2"){
          alert("Akses ditolak!");
          window.location="index.html";
        }
      });
    }
  });
}

// 🔥 SIDEBAR
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("show");
  document.getElementById("overlay").classList.toggle("show");
  document.querySelector(".menu-btn").classList.toggle("active");
}

// 🔥 LOGOUT
function logout(){
  auth.signOut().then(()=> window.location="index.html");
}

// 🔥 TOTAL USER
db.ref("users").on("value", s=>{
  document.getElementById("userCount").innerText = s.numChildren();
});

// 🔥 TOTAL BOOKING
db.ref("bookings").on("value", s=>{
  document.getElementById("bookingCount").innerText = s.numChildren();
});

// 🔥 TOTAL ABSENSI
db.ref("absensi").on("value", s=>{
  document.getElementById("absenCount").innerText = s.numChildren();
});

</script>

</body>
</html>
